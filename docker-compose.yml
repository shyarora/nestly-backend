services:
  # PostgreSQL Database - for local development
  postgres:
    image: postgres:15-alpine
    container_name: nestly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nestly
      POSTGRES_USER: nestly_user
      POSTGRES_PASSWORD: nestly_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestly_user -d nestly"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nestly-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nestly.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    profiles:
      - tools  # Only start with --profile tools

volumes:
  postgres_data:
    driver: local
